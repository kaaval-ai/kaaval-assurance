<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Kaaval Assurance — inference assurance plane for Gemma-first AMD workloads">
  <defs>
    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#172233" opacity="0.7"/>
    </pattern>
    <filter id="cyanGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="amberGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1420"/>
      <stop offset="1" stop-color="#060a11"/>
    </linearGradient>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f5a623"/>
    </marker>
    <style>
      .sans{font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .node{fill:#0b1019;stroke-width:1.4}
      .muted{fill:#8b9bb0}
      .label{fill:#e6edf3;font-size:13px;font-weight:700;letter-spacing:.02em}
      .sub{fill:#697991;font-size:10px}
    </style>
  </defs>

  <rect width="1200" height="360" rx="22" fill="#05080e"/>
  <rect width="1200" height="360" rx="22" fill="url(#dotGrid)"/>
  <rect x="1" y="1" width="1198" height="358" rx="21" fill="none" stroke="#172131"/>
  <path d="M0 2 H1200" stroke="#22d3ee" stroke-opacity=".5" stroke-width="2"/>

  <g class="sans">
    <text x="56" y="104" font-size="50" font-weight="800" letter-spacing="3.5" fill="#e6edf3">KAAVAL</text>
    <text x="56" y="154" font-size="50" font-weight="800" letter-spacing="3.5" fill="#e6edf3">ASSURANCE</text>
    <text x="58" y="190" font-size="19" fill="#9fb0c6">Inference assurance plane for Gemma-first AMD workloads</text>
    <text x="58" y="220" class="mono" font-size="12.5" fill="#5c6b80">route efficiently · verify continuously · escalate intelligently</text>
  </g>

  <g transform="translate(536 44)">
    <rect x="0" y="0" width="604" height="208" rx="18" fill="url(#panel)" stroke="#101c2b"/>

    <path d="M58 118 C112 118 126 118 176 118" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="5 7" opacity=".62"/>
    <path d="M254 108 C302 64 330 44 384 48" fill="none" stroke="#22d3ee" stroke-width="1.7" stroke-dasharray="5 7" opacity=".55"/>
    <path d="M254 128 C310 172 326 174 384 162" fill="none" stroke="#22d3ee" stroke-width="5" filter="url(#cyanGlow)" marker-end="url(#arrowCyan)"/>
    <path d="M472 148 C510 126 516 118 542 118" fill="none" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrowCyan)" opacity=".9"/>
    <path d="M472 162 C520 190 536 180 542 138" fill="none" stroke="#f5a623" stroke-width="1.8" stroke-dasharray="5 7" filter="url(#amberGlow)" marker-end="url(#arrowAmber)"/>

    <g class="sans">
      <rect class="node" x="22" y="92" width="112" height="52" rx="10" stroke="#1fb7c9"/>
      <text class="label" x="78" y="123" text-anchor="middle" fill="#22d3ee">Task</text>

      <rect class="node" x="178" y="82" width="124" height="72" rx="12" stroke="#22d3ee" filter="url(#cyanGlow)"/>
      <text class="label" x="240" y="112" text-anchor="middle">Router</text>
      <text class="sub" x="240" y="132" text-anchor="middle">local first</text>

      <rect class="node" x="386" y="22" width="142" height="56" rx="12" stroke="#f5a623"/>
      <text class="label" x="457" y="55" text-anchor="middle" fill="#f5a623">Gemma tier</text>

      <rect class="node" x="386" y="136" width="142" height="56" rx="12" stroke="#22d3ee" filter="url(#cyanGlow)"/>
      <text class="label" x="457" y="160" text-anchor="middle">Contract gate</text>
      <text class="sub" x="457" y="178" text-anchor="middle">Layer 1 verified</text>

      <rect class="node" x="544" y="92" width="116" height="52" rx="10" stroke="#34d399"/>
      <text class="label" x="602" y="123" text-anchor="middle" fill="#34d399">Answer</text>
    </g>

    <g class="mono" font-size="10" font-weight="800">
      <circle cx="150" cy="118" r="10" fill="#22d3ee" filter="url(#cyanGlow)"/><text x="150" y="122" text-anchor="middle" fill="#07101a">1</text>
      <circle cx="342" cy="164" r="10" fill="#22d3ee" filter="url(#cyanGlow)"/><text x="342" y="168" text-anchor="middle" fill="#07101a">2</text>
      <circle cx="532" cy="118" r="10" fill="#34d399"/><text x="532" y="122" text-anchor="middle" fill="#07101a">3</text>
    </g>
  </g>

  <g class="mono" font-size="11.5">
    <rect x="56" y="284" width="206" height="31" rx="15.5" fill="#0b1019" stroke="#22d3ee"/>
    <text x="159" y="304" text-anchor="middle" fill="#22d3ee">Layer 1 Contract Verification</text>
    <rect x="278" y="284" width="164" height="31" rx="15.5" fill="#0b1019" stroke="#5c6b80"/>
    <text x="360" y="304" text-anchor="middle" fill="#c3cfdd">Layer 2 EWMA Drift</text>
    <rect x="458" y="284" width="174" height="31" rx="15.5" fill="#0b1019" stroke="#a78bfa"/>
    <text x="545" y="304" text-anchor="middle" fill="#a78bfa">Layer 3 Sampled Audit</text>
    <rect x="648" y="284" width="186" height="31" rx="15.5" fill="#0b1019" stroke="#34d399"/>
    <text x="741" y="304" text-anchor="middle" fill="#34d399">Telemetry Truth Layer</text>
    <rect x="850" y="284" width="198" height="31" rx="15.5" fill="#0b1019" stroke="#f5a623" stroke-dasharray="5 4"/>
    <text x="949" y="304" text-anchor="middle" fill="#f5a623">AMD GPU Proof Pending</text>
  </g>
</svg>
