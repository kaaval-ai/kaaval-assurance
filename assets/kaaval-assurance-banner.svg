<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="Kaaval Assurance — inference assurance plane banner">
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#151c27" stroke-width="1"/>
    </pattern>
    <marker id="arrC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f5a623"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1200" height="360" fill="#0b0e14"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="2" fill="#22d3ee" opacity="0.55"/>

  <!-- Title block -->
  <text x="600" y="72" text-anchor="middle" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="46" font-weight="700" letter-spacing="4" fill="#e6edf3">KAAVAL ASSURANCE</text>
  <text x="600" y="106" text-anchor="middle" font-family="ui-sans-serif,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="20" fill="#8b9bb0">Inference Assurance Plane for Gemma-first AMD Workloads</text>
  <text x="600" y="132" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace"
        font-size="13.5" fill="#5c6b80">route efficiently · verify continuously · escalate intelligently</text>

  <!-- Flow motif -->
  <!-- task input -->
  <circle cx="280" cy="198" r="7" fill="#22d3ee"/>
  <text x="280" y="174" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace"
        font-size="12" fill="#8b9bb0">task input</text>

  <!-- input -> gemma -->
  <path d="M 292 198 C 340 198, 354 198, 394 198" fill="none" stroke="#22d3ee" stroke-width="2.2" marker-end="url(#arrC)"/>

  <!-- Gemma local tier -->
  <rect x="400" y="170" width="190" height="56" rx="7" fill="#10141c" stroke="#22d3ee" stroke-width="1.7"/>
  <text x="495" y="194" text-anchor="middle" font-family="ui-sans-serif,-apple-system,'Segoe UI',sans-serif"
        font-size="15" font-weight="600" fill="#e6edf3">Gemma Local Tier</text>
  <text x="495" y="213" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace"
        font-size="10.8" fill="#8b9bb0">open weights · ROCm + vLLM</text>

  <!-- gemma -> gate -->
  <path d="M 590 198 C 632 198, 648 198, 684 198" fill="none" stroke="#22d3ee" stroke-width="2.2" marker-end="url(#arrC)"/>

  <!-- contract gate -->
  <rect x="690" y="164" width="16" height="68" rx="3" fill="#10141c" stroke="#e6edf3" stroke-width="1.4"/>
  <rect x="716" y="164" width="16" height="68" rx="3" fill="#10141c" stroke="#e6edf3" stroke-width="1.4"/>
  <text x="711" y="151" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace"
        font-size="12" fill="#8b9bb0">contract gate</text>
  <path d="M 700 198 l 7 8 l 14 -16" fill="none" stroke="#34d399" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- gate -> verified -->
  <path d="M 732 198 C 780 198, 792 198, 828 198" fill="none" stroke="#34d399" stroke-width="2.2" marker-end="url(#arrG)"/>
  <circle cx="850" cy="198" r="10" fill="none" stroke="#34d399" stroke-width="2.5"/>
  <path d="M 844 198 l 5 5 l 8 -10" fill="none" stroke="#34d399" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="850" y="231" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace"
        font-size="12" fill="#34d399">verified answer</text>

  <!-- escalation branch: gate down to fireworks and back -->
  <path d="M 711 232 C 686 266, 608 266, 570 234" fill="none" stroke="#f5a623" stroke-width="2.1" stroke-dasharray="6 5" marker-end="url(#arrA)"/>
  <rect x="378" y="236" width="222" height="56" rx="7" fill="#10141c" stroke="#f5a623" stroke-width="1.7"/>
  <text x="489" y="258" text-anchor="middle" font-family="ui-sans-serif,-apple-system,'Segoe UI',sans-serif"
        font-size="14.2" font-weight="600" fill="#e6edf3">Fireworks Escalation</text>
  <text x="489" y="276" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace"
        font-size="10.8" fill="#8b9bb0">contract failure · re-verified</text>
  <path d="M 378 264 C 312 264, 302 226, 332 204" fill="none" stroke="#f5a623" stroke-width="1.7" stroke-dasharray="6 5" opacity="0.75" marker-end="url(#arrA)"/>
  <text x="298" y="274" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace"
        font-size="10.8" fill="#5c6b80">retry through the same gate</text>

  <!-- chips row -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="13.8">
    <rect x="20"  y="312" width="250" height="36" rx="18" fill="#10141c" stroke="#22d3ee" stroke-width="1.2"/>
    <text x="145" y="335" text-anchor="middle" fill="#22d3ee">Layer 1 Contract Verification</text>

    <rect x="290" y="312" width="198" height="36" rx="18" fill="#10141c" stroke="#8b9bb0" stroke-width="1.2"/>
    <text x="389" y="335" text-anchor="middle" fill="#c3cfdd">Layer 2 EWMA Drift</text>

    <rect x="508" y="312" width="214" height="36" rx="18" fill="#10141c" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="615" y="335" text-anchor="middle" fill="#a78bfa">Layer 3 Sampled Audit</text>

    <rect x="742" y="312" width="226" height="36" rx="18" fill="#10141c" stroke="#34d399" stroke-width="1.2"/>
    <text x="855" y="335" text-anchor="middle" fill="#34d399">Telemetry Truth Layer</text>

    <rect x="990" y="312" width="210" height="36" rx="18" fill="#10141c" stroke="#f5a623" stroke-width="1.4" stroke-dasharray="5 4"/>
    <text x="1095" y="335" text-anchor="middle" fill="#f5a623">AMD GPU Proof Pending</text>
  </g>

  <rect x="0" y="358" width="1200" height="2" fill="#1c2431"/>
</svg>
